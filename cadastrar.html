<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Cadastrar</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="sidebar">

        <div class="logo">
            Agenda
        </div>

        <div class="menu">

            <a href="/"> Início</a>

            <a href="/cadastrar">
                 Cadastrar Contato
            </a>

            <a href="/listar">
                 Contatos
            </a>

        </div>

    </div>

    <div class="main">

        <h1>Cadastrar Contato</h1>

        <form method="POST" class="formulario">

            <input type="text"
            name="nome"
            placeholder="Digite o nome"
            required>

            <input type="text"
            name="telefone"
            placeholder="Digite o telefone com DDD"
            required
            minlength="11"
            maxlength="11"
            pattern="[0-9]{11}">

            <input type="email"
            name="email"
            placeholder="Digite o email"
            required>

            <button type="submit" class="botao">
                Cadastrar
            </button>

        </form>

    </div>

</body>
</html>
